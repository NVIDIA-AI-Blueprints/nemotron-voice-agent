# On-prem service catalog for the Frontend/Backend Agent cascaded example.
# Host-native runs use localhost when this catalog points at the Docker booking-server hostname.

workstation:
  llm:
    nemotron-nano:
      name: "Nemotron 3 Nano 30B A3B"
      model_id: "nvidia/nemotron-3-nano"
      base_url: "http://nvidia-llm:8000/v1"
      system_prompt: ""
      max_tokens: 2048
      extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":false},"repetition_penalty":1.05}}'
  thinker-llm:
    nemotron-nano:
      name: "Nemotron 3 Nano 30B A3B Thinker"
      model_id: "nvidia/nemotron-3-nano"
      base_url: "http://nvidia-llm:8000/v1"
      max_tokens: 4096
      extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":true,"thinking_budget":1024},"repetition_penalty":1.05}}'
  booking-server:
    default:
      name: "Booking Server"
      server: "http://booking-server:8001"
  tts:
    magpie-multilingual-tts:
      name: "Magpie TTS"
      server: "tts-service:50051"
      voice_id: "Magpie-Multilingual.EN-US.Aria"
      model: "magpie-tts-multilingual"
      function_id: ""
      synthesis_mode: stitched
    chatterbox-multilingual-tts:
      name: "Chatterbox TTS Multilingual"
      server: "chatterbox-tts-service:50051"
      voice_id: "Chatterbox-Multilingual.en-US.Male"
      model: "chatterbox-tts-multilingual"
      function_id: ""
  asr:
    nemotron-asr-streaming-english:
      name: "Nemotron ASR Streaming English"
      server: "nemotron-asr-streaming-english:50052"
      model: "cache-aware-parakeet-rnnt-multi-asr-streaming-sortformer"
      function_id: ""
    parakeet-ctc:
      name: "Parakeet CTC 1.1B"
      server: "parakeet-ctc-asr:50052"
      model: "parakeet-ctc-1.1b-asr"
      function_id: ""

