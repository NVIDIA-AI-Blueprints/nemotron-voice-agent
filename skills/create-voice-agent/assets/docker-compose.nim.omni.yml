# Omni workstation/DGX: vLLM audio Omni (:8002) + Magpie TTS — NO ASR NIM.
# Usage: set HF_TOKEN in .env for first-time HF model pull
#        docker compose -f docker-compose.nim.omni.yml up -d
# Host ports: Omni 8002, TTS gRPC 50151 / HTTP 9000
# Requires: ≥~80 GB GPU for default 30B Omni NVFP4 + TTS (probe before up)
#
# Production: bake `vllm[audio]==0.20.0` into a custom image (see Dockerfile.omni-vllm.example)
# and set OMNI_VLLM_IMAGE to that tag. The quick-start command below installs at container start
# (slower cold start; acceptable for dev only).

name: voice-agent-nim-omni

services:
  nvidia-llm-vllm-omni:
    image: ${OMNI_VLLM_IMAGE:-vllm/vllm-openai:v0.20.0-cu130}
    pull_policy: if_not_present
    ipc: host
    shm_size: 16gb
    env_file:
      - .env
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_CACHE=/root/.cache/huggingface/hub
      - HF_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=${OMNI_GPU:-0}
    ports:
      - "8002:8002"
    volumes:
      - ${HF_CACHE:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - omni_vllm_cache:/root/.cache/vllm
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install --no-cache-dir "vllm[audio]==0.20.0" && \
        vllm serve ${OMNI_HF_MODEL:-nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4} \
          --host 0.0.0.0 \
          --port 8002 \
          --trust-remote-code \
          --max-model-len ${OMNI_MAX_MODEL_LEN:-32768} \
          --gpu-memory-utilization ${OMNI_GPU_MEM_UTIL:-0.35} \
          --max-num-seqs 4 \
          --enable-prefix-caching \
          --reasoning-parser nemotron_v3 \
          --limit-mm-per-prompt '{"audio":999,"image":999,"video":999}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8002/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 1800s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${OMNI_GPU:-0}"]
              capabilities: [gpu]

  tts-service:
    image: ${TTS_DOCKER_IMAGE:-nvcr.io/nim/magpie-tts-multilingual:1.9.0}
    environment:
      - NVIDIA_VISIBLE_DEVICES=${TTS_GPU:-0}
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - NIM_TAGS_SELECTOR=${TTS_NIM_TAGS:-name=magpie-tts-multilingual,batch_size=8}
    ports:
      - "50151:50051"
      - "9000:9000"
    volumes:
      - tts_cache:/opt/nim/.cache
    shm_size: 16gb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${TTS_GPU:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/v1/health/ready || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 3000s
    restart: unless-stopped

volumes:
  omni_vllm_cache:
  tts_cache:
