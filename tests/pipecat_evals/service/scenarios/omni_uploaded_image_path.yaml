name: omni_uploaded_image_path
user: !include _audio_user_kokoro.yaml
judge: !include _audio_judge_moonshine.yaml
turns:
  - expect:
      - event: response
        eval: "the spoken reply is a brief friendly initial greeting from an NVIDIA voice assistant"
        within_ms: 120000
  - user: "Use the uploaded attachment image. Please inspect the uploaded image and summarize what the diagram shows."
