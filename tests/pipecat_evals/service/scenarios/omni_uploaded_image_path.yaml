      - event: llm_started
        within_ms: 120000
      - event: tts_response
        eval: "the spoken reply briefly acknowledges it will inspect or analyze the uploaded image before the image analysis result"
        within_ms: 240000
      - event: tts_response
        eval: "the spoken reply summarizes or reports concrete findings from the uploaded architecture diagram"
        within_ms: 240000
