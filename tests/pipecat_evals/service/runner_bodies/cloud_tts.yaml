defaults:
  llm_id: cloud-nim:nemotron-nano
  asr_id: cloud-nim:nemotron-asr-streaming-english
  tts_server: grpc.nvcf.nvidia.com:443
  tts_voice_id: Magpie-Multilingual.EN-US.Aria

bodies:
  generic_default:
    pipeline_mode: generic-assistant
    prompt_key: generic_assistant
    session_id: eval-generic-cloud-tts-default

  generic_audio_default:
    pipeline_mode: generic-assistant
    prompt_key: generic_assistant
    session_id: eval-generic-audio-cloud-tts

  generic_flowershop:
    pipeline_mode: generic-assistant
    prompt_key: flowershop
    session_id: eval-generic-cloud-tts-flowershop

  generic_without_tools:
    pipeline_mode: generic-assistant
    prompt_key: generic_assistant_without_tools
    session_id: eval-generic-cloud-tts-without-tools

  multilingual_fixed_english:
    pipeline_mode: multilingual-assistant
    prompt_key: multilingual_voice_assistant
    asr_id: cloud-nim:nemotron-asr-streaming-multilingual
    asr_language_code: en-US
    session_id: eval-multilingual-cloud-tts-fixed-english

  multilingual_audio_fixed_english:
    pipeline_mode: multilingual-assistant
    prompt_key: multilingual_voice_assistant
    asr_id: cloud-nim:nemotron-asr-streaming-multilingual
    asr_language_code: en-US
    session_id: eval-multilingual-audio-cloud-tts-fixed-english

  multilingual_fixed_spanish:
    pipeline_mode: multilingual-assistant
    prompt_key: multilingual_voice_assistant
    asr_id: cloud-nim:nemotron-asr-streaming-multilingual
    asr_language_code: es-ES
    session_id: eval-multilingual-cloud-tts-fixed-spanish

  frontend_backend_default:
    pipeline_mode: frontend-backend-agent
    prompt_key: talker
    thinker_llm_id: cloud-nim:nemotron-nano
    session_id: eval-frontend-backend-cloud-tts-default

  omni_default:
    pipeline_mode: omni-assistant
    prompt_key: generic_omni_assistant
    llm_id: cloud-nim:nemotron-omni-nvfp4
    session_id: eval-omni-cloud-tts-default

  omni_uploaded_image:
    pipeline_mode: omni-assistant-subagents
    llm_id: cloud-nim:nemotron-omni-nvfp4
    system_prompt: "Eval-only routing guard: when Available input state says uploaded_attachment is available and the user asks about the uploaded attachment, image, file, or diagram, choose turn_action=analyze_attachment, selected_input_source=uploaded_attachment, and media_analysis_action=new, provide a short acknowledgement only, and let the media analyzer produce the actual description."
    session_id: eval-omni-uploaded-image-cloud-tts
    eval_attachment:
      path: src/examples/omni_assistant/images/omni-assistant-architecture.png
      kind: image
      content_type: image/png
      name: omni-assistant-architecture.png
