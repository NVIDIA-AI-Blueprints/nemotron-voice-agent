# Service-backed scenarios for low-VRAM self-hosted runners. These use NVIDIA
# cloud ASR/LLM/TTS, plus local Ollama judge and local booking server.

bots_dir: ../../../src
scenarios_dir: scenarios
concurrency: 1
base_port: 8480
runs_dir: ../../../eval-runs
record: true
spawn: "env PLATFORM=cloud APP_RUNTIME=host BOOKING_BACKEND_URL=http://localhost:8001 FRONTEND_BACKEND_AGENT_TODAY=2026-04-30 FRONTEND_BACKEND_DIRECT_TOOL_RESPONSE=true THINKER_FILLER_THRESHOLD_SECONDS=999 THINKER_TOOL_TIMEOUT_SECONDS=90 OMNI_MAX_TOKENS=1024 MEDIA_ANALYZER_MAX_TOKENS=512 MEDIA_ANALYZER_TEMPERATURE=0 TTS_STOP_FRAME_TIMEOUT_S=45 {python} {bot} -t eval --port {port}"

suite:
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: generic_default
    scenarios:
      - generic_initial_greeting
      - generic_basic_response
      - generic_tool_bmi
      - generic_tool_weather_fallback
      - generic_context_memory
      - generic_latency_smoke
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: generic_without_tools
    scenarios:
      - generic_tool_disabled_prompt
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: generic_flowershop
    scenarios:
      - generic_flowershop_persona
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: multilingual_fixed_english
    scenarios:
      - multilingual_initial_greeting
      - multilingual_basic_english
      - multilingual_fixed_english_lock
      - multilingual_latency_smoke
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: multilingual_fixed_spanish
    scenarios:
      - multilingual_fixed_spanish
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: frontend_backend_default
    scenarios:
      - frontend_backend_initial_greeting
      - frontend_backend_identity_direct
      - frontend_backend_unsupported_nonflight
      - frontend_backend_missing_info_handoff
      - frontend_backend_flight_search
      - frontend_backend_pnr_status
      - frontend_backend_cancel_after_search
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: omni_default
    scenarios:
      - omni_initial_greeting
      - omni_basic_response
      - omni_context_memory
      - omni_latency_smoke
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: omni_uploaded_image
    scenarios:
      - omni_uploaded_image_path
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: generic_audio_default
    scenarios:
      - generic_audio_e2e_roundtrip
  - bot: eval_bot.py
    runner_body: runner_bodies/cloud_tts.yaml
    runner_body_key: multilingual_audio_fixed_english
    scenarios:
      - multilingual_audio_fixed_english_roundtrip
